<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <rect width="1400" height="760" fill="#fffdf8"/>
  <text x="80" y="90" fill="#1d1c19" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="42" font-weight="800">Gem 是什么？</text>
  <text x="80" y="145" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="24">可以把它理解成：保存了角色、任务、规则和输出格式的专属 Gemini。</text>
  <g transform="translate(80 220)">
    <rect width="220" height="240" rx="18" fill="#d7e7ff" stroke="#d8d2c8"/>
    <text x="36" y="72" fill="#1d1c19" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30" font-weight="800">角色</text>
    <text x="36" y="118" fill="#3b3935" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="22">你是谁？</text>
    <text x="36" y="160" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">例如：视觉资产</text>
    <text x="36" y="190" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">库管理员</text>
  </g>
  <g transform="translate(330 220)">
    <rect width="220" height="240" rx="18" fill="#f8d7df" stroke="#d8d2c8"/>
    <text x="36" y="72" fill="#1d1c19" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30" font-weight="800">任务</text>
    <text x="36" y="118" fill="#3b3935" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="22">你做什么？</text>
    <text x="36" y="160" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">判断、拆解、</text>
    <text x="36" y="190" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">转化、输出</text>
  </g>
  <g transform="translate(580 220)">
    <rect width="220" height="240" rx="18" fill="#dff1db" stroke="#d8d2c8"/>
    <text x="36" y="72" fill="#1d1c19" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30" font-weight="800">背景</text>
    <text x="36" y="118" fill="#3b3935" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="22">服务谁？</text>
    <text x="36" y="160" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">业务、产品、</text>
    <text x="36" y="190" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">人群与场景</text>
  </g>
  <g transform="translate(830 220)">
    <rect width="220" height="240" rx="18" fill="#f6e4b8" stroke="#d8d2c8"/>
    <text x="36" y="72" fill="#1d1c19" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30" font-weight="800">标准</text>
    <text x="36" y="118" fill="#3b3935" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="22">什么叫好？</text>
    <text x="36" y="160" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">审美、合规、</text>
    <text x="36" y="190" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">商用边界</text>
  </g>
  <g transform="translate(1080 220)">
    <rect width="220" height="240" rx="18" fill="#ece7dc" stroke="#d8d2c8"/>
    <text x="36" y="72" fill="#1d1c19" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30" font-weight="800">输出</text>
    <text x="36" y="118" fill="#3b3935" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="22">怎么交付？</text>
    <text x="36" y="160" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">结论、建议、</text>
    <text x="36" y="190" fill="#65615a" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="18">提示词</text>
  </g>
  <rect x="80" y="545" width="1240" height="110" rx="18" fill="#1d1c19"/>
  <text x="120" y="610" fill="#fffdf8" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30" font-weight="800">一句话：</text>
  <text x="240" y="610" fill="#fffdf8" font-family="Microsoft YaHei, PingFang SC, Arial" font-size="30">Gem 不是一个聊天入口，而是一套被保存下来的工作判断流程。</text>
</svg>
